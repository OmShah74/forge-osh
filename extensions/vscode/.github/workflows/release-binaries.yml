name: Release Binaries

# Triggered when a Rust release tag is pushed. Builds forge-osh across
# every platform the extension needs and uploads each artifact under a
# predictable name so the publish-extension workflow can pick them up.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: linux-x64
            ext: ""
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            name: linux-arm64
            ext: ""
            cross: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: win32-x64
            ext: ".exe"
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            name: win32-arm64
            ext: ".exe"
          - os: macos-13
            target: x86_64-apple-darwin
            name: darwin-x64
            ext: ""
          - os: macos-14
            target: aarch64-apple-darwin
            name: darwin-arm64
            ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux ARM64 only)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Sign + notarize (macOS)
        if: contains(matrix.os, 'macos')
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          MAC_CERT_BASE64: ${{ secrets.MAC_CERT_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: |
          if [ -n "${MAC_CERT_BASE64:-}" ]; then
            bash extensions/vscode/scripts/macos-sign.sh \
              target/${{ matrix.target }}/release/forge-osh
          else
            echo "::warning::macOS signing secrets not set — shipping unsigned binary"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: forge-osh-${{ matrix.name }}
          path: target/${{ matrix.target }}/release/forge-osh${{ matrix.ext }}
          if-no-files-found: error
